<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Contact</title>

<link rel="stylesheet" href="styles.css">

<style>
.contact-box{
    width:90%;
    max-width:400px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.contact-box input,
.contact-box textarea{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.contact-box button{
    width:100%;
    padding:12px;
    background:black;
    color:white;
    border:none;
    cursor:pointer;
}

.contact-box button:hover{
    background:#333;
}

.contact-heading{
    text-align:center;
    color:white;
    padding-top:30px;
}
 .big-footer{
    width:100%;
    background:black;
    color:white;
    text-align:center;
    padding:60px 20px;
    margin-top:30px;
}

.footer-links{
    margin:20px 0;
}

.footer-links a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.footer-content h2,
.footer-content p{
    color:white;
}   
</style>

</head>

<h2 class="contact-heading">HIRE ME</h2>

<div class="contact-box">

<form action="https://formspree.io/f/mzdlzrob" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" rows="6" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>
